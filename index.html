<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>بانگ — سلێمانی</title>
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--sf:#111827;--sf2:#1a2235;--gld:#c9a84c;--gld2:#e8c97a;--gdim:#7a6030;--tx:#e8e4d8;--txd:#7a7665;--fj:#818cf8;--sh:#f59e0b;--dh:#34d399;--as:#60a5fa;--mg:#fb923c;--is:#a78bfa;--ser:'Amiri',serif;--ku:'Noto Kufi Arabic',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ku);background:var(--bg);min-height:100vh;color:var(--tx);direction:rtl;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 25%,rgba(129,140,248,.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 75%,rgba(201,168,76,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:0 0 60px}
.header{text-align:center;padding:28px 20px 14px}
.bsm{font-family:var(--ser);font-size:21px;color:var(--gld);margin-bottom:5px;opacity:.9}
.loc{font-size:12px;color:var(--txd);display:flex;align-items:center;justify-content:center;gap:5px}
.cw{background:var(--sf);margin:0 16px 14px;border-radius:20px;padding:18px 20px;border:1px solid rgba(201,168,76,.12);text-align:center;position:relative;overflow:hidden}
.cw::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gld),transparent)}
.ct{font-family:var(--ser);font-size:50px;color:var(--tx);letter-spacing:3px;line-height:1}
.cd{font-size:11px;color:var(--txd);margin-top:5px}
.nb{margin-top:12px;padding:10px 14px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:12px;display:flex;justify-content:space-between;align-items:center}
.nl{font-size:10px;color:var(--txd)}.nn{font-size:14px;font-weight:700;color:var(--gld2)}
.ncd{font-family:var(--ser);font-size:22px;color:var(--gld);letter-spacing:2px}
.pw{padding:0 16px}
.st{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.pc{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--sf);border-radius:14px;margin-bottom:7px;border:1px solid rgba(255,255,255,.05);transition:all .3s;position:relative;overflow:hidden}
.pc.nx{border-color:rgba(201,168,76,.32);background:linear-gradient(135deg,var(--sf),rgba(201,168,76,.05));box-shadow:0 4px 20px rgba(201,168,76,.08)}
.pc.nx::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gld),var(--gld2));border-radius:0 14px 14px 0}
.pc.ps{opacity:.38}
.pd{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.pi{flex:1;min-width:0}
.pn{font-family:var(--ser);font-size:18px;font-weight:700;line-height:1}
.pk{font-size:11px;color:var(--txd);margin-top:1px}
.pbg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-top:3px;display:inline-block}
.pt{font-family:var(--ser);font-size:22px;font-weight:700;letter-spacing:1px;text-align:left}
.fj .pd{background:rgba(129,140,248,.15);color:var(--fj)}.fj .pn,.fj .pt{color:var(--fj)}
.sh .pd{background:rgba(245,158,11,.15);color:var(--sh)}.sh .pn,.sh .pt{color:var(--sh)}
.dh .pd{background:rgba(52,211,153,.15);color:var(--dh)}.dh .pn,.dh .pt{color:var(--dh)}
.as .pd{background:rgba(96,165,250,.15);color:var(--as)}.as .pn,.as .pt{color:var(--as)}
.mg .pd{background:rgba(251,146,60,.15);color:var(--mg)}.mg .pn,.mg .pt{color:var(--mg)}
.is .pd{background:rgba(167,139,250,.15);color:var(--is)}.is .pn,.is .pt{color:var(--is)}
.sc{margin:14px 16px 0;background:var(--sf);border-radius:16px;padding:14px 16px;border:1px solid rgba(255,255,255,.05)}
.tr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tr:last-child{border-bottom:none}
.tl{font-size:13px;color:var(--tx);display:flex;align-items:center;gap:7px}
.tl small{font-size:10px;color:var(--txd);display:block;margin-top:1px}
.tog{width:44px;height:24px;background:rgba(255,255,255,.1);border-radius:12px;cursor:pointer;position:relative;transition:background .3s;-webkit-appearance:none;appearance:none;flex-shrink:0;border:none;outline:none}
.tog:checked{background:var(--gld)}
.tog::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;right:3px;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.tog:checked::after{transform:translateX(-20px)}
.pb{width:calc(100% - 32px);margin:10px 16px 0;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gdim),var(--gld));color:#0a0e1a;font-family:var(--ku);font-size:14px;font-weight:700;cursor:pointer;display:none}
.pb.show{display:block}
.ao{position:fixed;inset:0;z-index:10000;background:rgba(10,14,26,.97);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.ao.active{display:flex}
.ai{font-size:60px;animation:ap 1s ease-in-out infinite}
@keyframes ap{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.att{font-family:var(--ser);font-size:30px;color:var(--gld2);margin:14px 0 5px}
.asb{font-size:15px;color:var(--txd);margin-bottom:22px}
.abt{padding:11px 30px;border:2px solid var(--gld);background:transparent;color:var(--gld);border-radius:12px;font-family:var(--ku);font-size:14px;cursor:pointer}
.ro{position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:0}
.ro.active{opacity:1;animation:rf .6s ease-in-out 5}
@keyframes rf{0%,100%{background:rgba(201,168,76,0)}50%{background:rgba(201,168,76,.1)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf2);border:1px solid rgba(201,168,76,.25);padding:11px 18px;border-radius:12px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;max-width:90vw;text-align:center;color:var(--gld2)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="ro" id="ro"></div>
<div class="ao" id="ao">
  <div class="ai">🕌</div>
  <div class="att" id="att">کاتی نوێژ</div>
  <div class="asb" id="asb">کاتی نوێژ گەیشت</div>
  <button class="abt" onclick="stopAdhan()">⏹ وەستاندن</button>
</div>
<div class="app">
  <div class="header">
    <div class="bsm">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ</div>
    <div class="loc">📍 سلێمانی &nbsp;·&nbsp; مەزهەبی شافیعی</div>
  </div>
  <div class="cw">
    <div class="ct" id="CT">--:--:--</div>
    <div class="cd" id="CD"></div>
    <div class="nb">
      <div><div class="nl">نوێژی داهاتوو</div><div class="nn" id="NN">---</div></div>
      <div class="ncd" id="NCD">--:--</div>
    </div>
  </div>
  <div class="pw">
    <div class="st">کاتەکانی نوێژ — ئەمڕۆ</div>
    <div id="PL"></div>
  </div>
  <div class="sc">
    <div class="st" style="margin-bottom:8px">⚙️ ڕێکخستنەکان</div>
    <div class="tr"><label class="tl">🔔 ئاگادارکردنەوە<small>کاتێک شاشە قفلە</small></label><input type="checkbox" class="tog" id="tN" checked onchange="save()"></div>
    <div class="tr"><label class="tl">🔊 دەنگی بانگ<small>ئەذانی ئاسایی</small></label><input type="checkbox" class="tog" id="tA" checked onchange="save()"></div>
    <div class="tr"><label class="tl">📳 هەژاندن</label><input type="checkbox" class="tog" id="tV" checked onchange="save()"></div>
    <div class="tr"><label class="tl">⏰ ١٥ خولەک پێش<small>یادەرێکردنەوەی پێشوەختە</small></label><input type="checkbox" class="tog" id="tP" onchange="save()"></div>
  </div>
  <button class="pb" id="PB" onclick="askPerm()">🔔 چالاک کردنی ئاگادارکردنەوە — کلیک بکە</button>
<button class="pb show" id="TB" onclick="testAlarm()" style="background:linear-gradient(135deg,#1a3a2a,#2d6a4f);color:#52b788;border:1px solid #2d6a4f;margin-top:6px">🧪 تیست — تاقیکردنەوەی بانگ ئێستا</button>
</div>
<div class="toast" id="toast"></div>

    var p = PR[idx];

        document.getElementById('att').textContent = p.ar + '  —  ' + p.ku;
        document.getElementById('asb').textContent = timeStr + ' · کاتی نوێژ گەیشت';
        document.getElementById('ao').classList.add('active');
        if (cfg.a) playAdhan();
        var r = document.getElementById('ro');
        r.classList.add('active');
        setTimeout(function() { r.classList.remove('active'); }, 4000);
    }
    showToast('🕌 ' + p.ku + ' — ' + timeStr);
    if (cfg.v && navigator.vibrate) {
        navigator.vibrate([500, 200, 500, 200, 1000, 200, 500]);
    }
    render();
}

// ===== Service Worker =====
function sendToSW(msg) {
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage(msg);
    }
}

function initSW() {
    if (!navigator.serviceWorker.controller) {
        setTimeout(initSW, 500);
        return;
    }
    sendToSW({
        type:        'INIT',
        prayerTimes: tt(),
        dayIndex:    di(),
        settings:    { n: !!cfg.n, v: !!cfg.v, pre: !!cfg.p },
        firedToday:  frd
    });
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js?v=' + CACHE_VER).then(function(r) {
        swReg = r;
        initSW();
    }).catch(function(e) {
        console.log('SW error:', e);
    });

    navigator.serviceWorker.addEventListener('message', function(e) {
        if (!e.data) return;
        var d = e.data;

        if (d.type === 'PRAYER_FIRED') {
            showAlarm(d.idx, d.time);
        }

        if (d.type === 'FIRED_UPDATE') {
            frd = d.firedToday || {};
        }

        if (d.type === 'REQUEST_NEW_DAY') {
            frd = {};
            lday = -1;
            sendToSW({
                type:        'NEW_DAY',
                prayerTimes: tt(),
                dayIndex:    di()
            });
        }
    });
}

// ===== ڕێگەپێدان =====
function askPerm() {
    if (Notification.permission === 'denied') {
        showToast('❌ لە ڕێکخستنەکانی مۆبایل چالاک بکەرەوە');
        return;
    }
    Notification.requestPermission().then(function(p) {
        if (p === 'granted') {
            showToast('✅ ئاگادارکردنەوە چالاک بوو!');
            chkP();
            initSW();
        } else {
            showToast('⚠️ ڕێگەپێدان نەدرا');
        }
    });
}

function chkP() {
    var btn = document.getElementById('PB');
    if (btn) btn.classList.toggle('show', Notification.permission !== 'granted');
}

// ===== نیشاندانی کاتەکان =====
function render() {
    var t   = tt();
    var now = Date.now();
    var L   = document.getElementById('PL');
    if (!L) return;

    var nx = -1;
    for (var i = 0; i < 6; i++) {
        if (pms(t[i][0], t[i][1]) > now) { nx = i; break; }
    }

    var html = '';
    for (var i = 0; i < 6; i++) {
        var h  = t[i][0];
        var m  = t[i][1];
        var ms = pms(h, m);
        var ps = ms <= now;
        var nx_cls = (i === nx) ? ' nx' : '';
        var ps_cls = ps ? ' ps' : '';
        var badge = '';
        if (i === nx) {
            badge = '<span class="pbg" style="background:rgba(201,168,76,.15);color:var(--gld)">داهاتوو</span>';
        } else if (ps) {
            badge = '<span class="pbg" style="background:rgba(255,255,255,.05);color:var(--txd)">تێپەڕی</span>';
        }
        html += '<div class="pc ' + PR[i].cls + ps_cls + nx_cls + '">';
        html += '<div class="pd">' + PR[i].icon + '</div>';
        html += '<div class="pi">';
        html += '<div class="pn">' + PR[i].ar + '</div>';
        html += '<div class="pk">' + PR[i].ku + '</div>';
        html += badge;
        html += '</div>';
        html += '<div class="pt">' + fmt(h, m) + '</div>';
        html += '</div>';
    }
    L.innerHTML = html;

    var NN  = document.getElementById('NN');
    var NCD = document.getElementById('NCD');
    if (nx >= 0) {
        var nh = t[nx][0];
        var nm = t[nx][1];
        if (NN)  NN.textContent  = PR[nx].ar + ' — ' + PR[nx].ku;
        if (NCD) NCD.textContent = fcd(pms(nh, nm) - now);
    } else {
        var ti  = Math.min(di() + 1, 364);
        var fh  = PD[ti][0][0];
        var fm  = PD[ti][0][1];
        var tom = new Date();
        tom.setDate(tom.getDate() + 1);
        tom.setHours(fh, fm, 0, 0);
        if (NN)  NN.textContent  = 'فەجری سبەینێ';
        if (NCD) NCD.textContent = fcd(tom - Date.now());
    }
}

// ===== tick — ساعات و ڕۆژ =====
function tick() {
    var n = new Date();
    var CT = document.getElementById('CT');
    if (CT) CT.textContent = p2(n.getHours()) + ':' + p2(n.getMinutes()) + ':' + p2(n.getSeconds());

    var days   = ['یەکشەممە','دووشەممە','سێشەممە','چوارشەممە','پێنجشەممە','هەینی','شەممە'];
    var months = ['کانوونی دووەم','شوبات','ئازار','نیسان','ئایار','حوزەیران','تەممووز','ئاب','ئەیلوول','تشرینی یەکەم','تشرینی دووەم','کانوونی یەکەم'];
    var CD = document.getElementById('CD');
    if (CD) CD.textContent = days[n.getDay()] + '، ' + n.getDate() + ' ' + months[n.getMonth()] + ' ' + n.getFullYear();

    // ڕۆژی نوێ
    var d = di();
    if (d !== lday) { frd = {}; lday = d; }

    // هەموو ٣٠ چرکە render بکە
    if (n.getSeconds() % 30 === 0) render();
}

// ===== ڕێکخستنەکان =====
function save() {
    var tN = document.getElementById('tN');
    var tA = document.getElementById('tA');
    var tV = document.getElementById('tV');
    var tP = document.getElementById('tP');
    cfg.n = tN ? (tN.checked ? 1 : 0) : 1;
    cfg.a = tA ? (tA.checked ? 1 : 0) : 1;
    cfg.v = tV ? (tV.checked ? 1 : 0) : 1;
    cfg.p = tP ? (tP.checked ? 1 : 0) : 0;
    localStorage.setItem('ps', JSON.stringify(cfg));
    chkP();
    sendToSW({ type: 'SETTINGS', settings: { n: !!cfg.n, v: !!cfg.v, pre: !!cfg.p } });
}

function load() {
    var s = localStorage.getItem('ps');
    if (s) {
        var saved = JSON.parse(s);
        cfg.n = saved.n !== undefined ? saved.n : cfg.n;
        cfg.a = saved.a !== undefined ? saved.a : cfg.a;
        cfg.v = saved.v !== undefined ? saved.v : cfg.v;
        cfg.p = saved.p !== undefined ? saved.p : cfg.p;
    }
    var tN = document.getElementById('tN');
    var tA = document.getElementById('tA');
    var tV = document.getElementById('tV');
    var tP = document.getElementById('tP');
    if (tN) tN.checked = !!cfg.n;
    if (tA) tA.checked = !!cfg.a;
    if (tV) tV.checked = !!cfg.v;
    if (tP) tP.checked = !!cfg.p;
}

function showToast(msg) {
    var t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    if (t._timer) clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// ===== تیست =====
function testAlarm() {
    var btn = document.getElementById('TB');
    if (btn) { btn.textContent = '⏳ تاقیکردنەوە دەستی پێکرد...'; btn.disabled = true; }

    // ١ — دەنگ و ئەنیمەیشن ئێستا
    showAlarm(0, fmt(new Date().getHours(), new Date().getMinutes()));

    // ٢ — ئاگادارکردنەوەی سیستەم (٢ چرکە دواتر)
    setTimeout(function() {
        if (Notification.permission !== 'granted') {
            showToast('⚠️ سەرەتا ڕێگەپێدان بکە');
            if (btn) { btn.textContent = '🧪 تیست — تاقیکردنەوەی بانگ ئێستا'; btn.disabled = false; }
            return;
        }
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'TEST_NOTIF' });
        } else {
            // fallback direct notification
            new Notification('🕌 تیست — فەجر', {
                body: 'ئاگادارکردنەوە کار دەکات ✅',
                requireInteraction: true
            });
        }
        if (btn) { btn.textContent = '✅ تیست ئەنجام درا — سەیری ئاگادارکردنەوە بکە'; btn.disabled = false; setTimeout(function(){ btn.textContent='🧪 تیست — تاقیکردنەوەی بانگ ئێستا'; }, 4000); }
    }, 1500);
}

// ===== دەستپێکردن =====
load();
chkP();
render();
setInterval(tick, 1000);
tick();

</script>
